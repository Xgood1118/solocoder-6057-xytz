version: 2

before:
  hooks:
    - go mod tidy

gomod:
  proxy: true
  env:
    - GOPROXY=https://proxy.golang.org,direct
    - GOSUMDB=sum.golang.org
    - GOPRIVATE=github.com/xdagiz/xytz
  mod: mod

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/xdagiz/xytz/internal/version.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "xytz-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-next"

source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}"

release:
  header: |
    ## Installation

    ```bash
    # Binary download
    curl -fsSL https://raw.githubusercontent.com/xdagiz/xytz/main/install.sh | bash

    # Homebrew
    brew install xdagiz/tap/xytz

    # Scoop
    scoop bucket add xdagiz https://github.com/xdagiz/scoop-bucket.git
    scoop install xdagiz/xytz

    # Or via Go
    go install github.com/xdagiz/xytz@latest

    # Arch Linux (AUR)
    paru -S xytz      # source build
    paru -S xytz-bin  # prebuilt binary
    ```

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^test:"
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: Dependency updates
      regexp: "^.*\\(deps\\)*:+.*$"
      order: 300
    - title: "New Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 100
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 200
    - title: "Documentation updates"
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 400
    - title: Other work
      order: 9999

homebrew_casks:
  - name: xytz
    repository:
      owner: xdagiz
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/xdagiz/xytz"
    description: "a beautiful TUI YouTube Downloader"
  - dependencies:
      - formula: yt-dlp
      - formula: ffmpeg

aurs:
  - homepage: "https://github.com/xdagiz/xytz"
    description: "a beautiful TUI YouTube Downloader/Player. Pre compiled."
    maintainers:
      - "Dagmawi Ali <xdagiz at protonmail dot com>"
    contributors:
      - "Dagmawi Ali <xdagiz at protonmail dot com>"
    license: "MIT"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/xytz-bin.git"
    depends:
      - yt-dlp
      - ffmpeg
    optdepends:
      - "mpv: for playing videos"

aur_sources:
  - name: xytz
    homepage: "https://github.com/xdagiz/xytz"
    description: "a beautiful TUI YouTube Downloader"
    maintainers:
      - "Dagmawi Ali <xdagiz at protonmail dot com>"
    contributors:
      - "Dagmawi Ali <xdagiz at protonmail dot com>"
    license: "MIT"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/xytz.git"
    depends:
      - yt-dlp
      - ffmpeg
    provides:
      - xytz
    conflicts:
      - xytz-bin
    optdepends:
      - "mpv: for playing videos"
    build: |-
      cd "${pkgname}_${pkgver}"
      export CGO_CPPFLAGS="${CPPFLAGS}"
      export CGO_CFLAGS="${CFLAGS}"
      export CGO_CXXFLAGS="${CXXFLAGS}"
      export CGO_LDFLAGS="${LDFLAGS}"
      export GOFLAGS="-buildmode=pie -trimpath -mod=readonly -modcacherw"
      go build -ldflags="-w -s -buildid='' -linkmode=external -X github.com/xdagiz/xytz/internal/version.Version=${pkgver}" -o xytz .
    package: |-
      cd "${pkgname}_${pkgver}"
      install -Dsm755 ./xytz "${pkgdir}/usr/bin/xytz"
      install -Dsm644 ./LICENSE "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"

scoops:
  - name: xytz
    directory: bucket
    homepage: "https://github.com/xdagiz/xytz"
    description: "a beautiful TUI YouTube Downloader"
    license: MIT
    depends: ["yt-dlp", "ffmpeg"]
    repository:
      owner: xdagiz
      name: scoop-bucket
      token: "{{ .Env.SCOOP_TOKEN }}"
